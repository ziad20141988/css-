<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .color-title{
            color: blueviolet;
        }
        #p2{
            color: rgb(200, 210, 204);
            background-color: rgb(12, 88, 90);
        }
        #p5{
            color: rgba(200, 201, 240, 1);
            background-color: rgba(0, 2, 0, 0.5);
        }
        #p4{
            color: hsl(150, 100%, 30%);
            background-color: hsl(200, 50%, 20%);
        }
        #p6{
            color: hsla(200, 50%, 20%, 0.5);
            background-color: hsla(356, 10%, 10%, 0.1)
        }
        #P3{
            color: #aa33cc;
            background-color: #e6c9df;
        }
    </style>
</head>
<body>
    <H1 class="color-title"  id="p1"> Color Name</H1>
    <H1><p id="p2"> RGB</p></H1>
    <h1><P id="P3">Hexadecimal</P></h1>
    <H1><p id="p4">HSL</p></H1>
    <H1><p id="p5">RGBA</p></H1>
    <H1><p id="p6">HSLA</p></H1>
</body>
</html>
